name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.4.6"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.][A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.rel.outputs.tag }}" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${{ steps.rel.outputs.tag }}"

      - name: Verify release source
        shell: bash
        run: |
          test -f "_meta.lua"
          test -f "main.lua"
          test -f "sui_updater.lua"
          test -d "icons"
          test -d "desktop_modules"
          grep -q 'GITHUB_OWNER = "0xstillb"' sui_updater.lua

      - name: Verify version matches tag
        shell: bash
        run: |
          version="$(sed -n 's/.*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' _meta.lua | head -n 1)"
          expected="${{ steps.rel.outputs.tag }}"
          expected="${expected#v}"
          if [[ "$version" != "$expected" ]]; then
            echo "_meta.lua version '$version' does not match tag '${{ steps.rel.outputs.tag }}'" >&2
            exit 1
          fi

      - name: Build release zip
        shell: bash
        run: |
          mkdir -p dist/stage
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build_codex' \
            --exclude 'dist' \
            --exclude 'mockups' \
            --exclude '*.tmp' \
            --exclude '*.bak' \
            ./ dist/stage/simpleui.koplugin/
          cd dist/stage
          zip -r -9 ../simpleui.koplugin.zip simpleui.koplugin

      - name: Verify release zip contents
        shell: bash
        run: |
          unzip -l dist/simpleui.koplugin.zip | tee dist/zip-contents.txt
          grep -q 'simpleui.koplugin/_meta.lua' dist/zip-contents.txt
          grep -q 'simpleui.koplugin/main.lua' dist/zip-contents.txt
          grep -q 'simpleui.koplugin/sui_updater.lua' dist/zip-contents.txt
          grep -q 'simpleui.koplugin/icons/custom/shelf.svg' dist/zip-contents.txt

      - name: Prepare release notes
        shell: bash
        run: |
          if [[ -f RELEASE_NOTES.md ]]; then
            cp RELEASE_NOTES.md dist/release-notes.md
          else
            {
              echo "## What's New"
              echo
              git log --pretty='- %s' "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD^)"..HEAD || true
            } > dist/release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          files: dist/simpleui.koplugin.zip
          body_path: dist/release-notes.md
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
